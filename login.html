<html>
<head>
<meta charset="UTF-8">
<title>Connections - Login</title>
<link rel="stylesheet" href="style.css">
<style>
body{
    font-family:Arial,sans-serif;
    background:#1A1528;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
    min-height: 100vh;
}
.login-box{

    width:340px;
    background:#232136;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.4);

}
h1{
    margin-bottom:25px;
    color:#A78BFA;
}
input{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#A78BFA;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}
button:hover{
    background:#C4B5FD;
}
a{
    color:#A78BFA;
    text-decoration:none;
}
a:hover{
    color:#C4B5FD;
}
#error{
    color:#ff8080;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="login-box">
<h1>Connections</h1>
<hr class="divider" style="clear:both;">

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<hr class="divider" style="clear:both;">
<p>Don't have an account?</p>
<a href="signup.html">Create Account</a>
<p id="error"></p>
<hr class="divider" style="clear:both;">
<div class="a"><sub>If you have any requests, questions, errors or complaints, email them to <b>23stratforde@clsg.org.uk.</b></sub></div>
</div>

<script>

function login(){
    const email=document.getElementById("email").value;
    const password=document.getElementById("password").value;
    if(email==="admin@example.com" && password==="password"){
        window.location.href="index.html";
    }else{

        document.getElementById("error").innerHTML="Incorrect email or password.";
    }
}
</script>
</body>
</html>
